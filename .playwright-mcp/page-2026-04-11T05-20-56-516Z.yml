      - heading "Summary" [level=3] [ref=e1465]
      - paragraph [ref=e1466]: In this exercise, you enhanced the production readiness of the SmartHotel application by enabling monitoring and analyzing logs using GitHub Copilot. You used Application Insights to gain deeper visibility into application performance and applied optimization techniques to improve efficiency and cost. Finally, you validated the application to ensure it is running reliably.
      - heading "You have successfully completed the lab!" [level=3] [ref=e1467]
      - paragraph [ref=e1468]: By completing this lab, you gained hands-on experience in migrating, modernizing, and optimizing the SmartHotel application using Azure and AI-powered tools. You started with discovery and assessment using Azure Migrate and Copilot, followed by designing a landing zone and performing migration. You then modernized the application using GitHub Copilot, implemented a CI/CD pipeline with GitHub Actions, and finally improved application reliability through monitoring, log analysis, and optimization.
      - paragraph [ref=e1469]: Overall, this lab demonstrated how Azure Copilot and GitHub Copilot can accelerate cloud migration, streamline development, and enhance application performance in a modern cloud environment.
