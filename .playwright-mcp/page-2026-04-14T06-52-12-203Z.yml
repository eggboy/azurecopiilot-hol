      - 'heading "Exercise 4: Application Modernization with GitHub Copilot modernization" [level=1] [ref=e55]'
      - paragraph [ref=e56]: This document serves as a comprehensive workshop guide that will walk you through the process of migrating a Java application to Azure using GitHub Copilot modernization. The exercise covers assessment, Java/framework upgrades, migration to Azure services, containerization, and deployment.
      - paragraph [ref=e57]:
        - strong [ref=e58]: "What the modernization Process Will Do:"
        - text: The modernization will transform your application from the outdated technologies to a modern Azure-native solution. This includes upgrading from Java 8 to Java 21, migrating from Spring Boot 2.x to 3.x, replacing AWS S3 with Azure Blob Storage, switching from RabbitMQ to Azure Service Bus, migrating to Azure Database for PostgreSQL, implementing managed identity authentication, adding health checks, containerizing the applications, and preparing them for cloud deployment with proper monitoring.
