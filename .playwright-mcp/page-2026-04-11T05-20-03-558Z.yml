  - generic [ref=e21]:
    - generic [ref=e691]:
      - heading "Azure Copilot assisted Migration" [level=1] [ref=e692]
      - 'heading "Overall Estimated Duration: 8 Hours" [level=2] [ref=e693]'
      - heading "Overview" [level=2] [ref=e694]
      - paragraph [ref=e695]: In this hands-on lab, you will migrate and modernize workloads to Azure with help of Azure Copilot. You will start by evaluating and migrating Windows and SQL Server workloads using Azure Migrate and Azure Site Recovery. Next, you will replicate and migrate a Red Hat VM and OSS DB workloads, enable Entra ID-based authentication, and connect to Azure Automanage. Finally, you will manage a Windows machine with Azure Arc, using Azure Site Recovery for disaster recovery, including test failovers and failovers to Azure VMs.
      - heading "Key Features of Infrastructure Migration to Azure" [level=3] [ref=e696]
      - list [ref=e697]:
        - listitem [ref=e698]:
          - paragraph [ref=e699]:
            - strong [ref=e700]: "Azure Copilot:"
            - text: Discover servers, create risk Assessment, VM assessment, cost estimates & get IAC terraform code for Landing Zone deployemnt
        - listitem [ref=e701]:
          - paragraph [ref=e702]:
            - strong [ref=e703]: "Seamless Workload Migration:"
            - text: Migrate Windows, SQL Server, Linux, and open-source database workloads using Azure Migrate and Azure Site Recovery (ASR). This ensures efficient and secure movement of applications and data from on-premises or other clouds to Azure.
        - listitem [ref=e704]:
          - paragraph [ref=e705]:
            - strong [ref=e706]: "Comprehensive Pre-Migration Setup:"
            - text: Set up your Azure environment with appropriate networking, resource groups, and migration tools. Leverage built-in guidance to ensure your infrastructure is ready for server migration and modernization.
        - listitem [ref=e707]:
          - paragraph [ref=e708]:
            - strong [ref=e709]: "Holistic Application and Data Migration:"
            - text: "Use Azure Migrate: Server Migration and tools like the Azure Hybrid Benefit to transition apps and databases with minimal downtime. This includes end-to-end support for migrating application configurations, databases, and dependencies."
        - listitem [ref=e710]:
          - paragraph [ref=e711]:
            - strong [ref=e712]: "Optimization of Migrated Workloads:"
            - text: Post-migration, optimize workloads for performance, cost, and security. Azure tools identify inefficiencies and enable scaling, resource rightsizing, and implementation of best practices across all stacks.
        - listitem [ref=e713]:
          - paragraph [ref=e714]:
            - strong [ref=e715]: "Modernization of Linux and OSS Databases:"
            - text: Leverage Azure's tailored solutions to modernize Linux workloads and open-source databases. Azure ensures compatibility and provides support for scaling and optimizing these environments.
        - listitem [ref=e716]:
          - paragraph [ref=e717]:
            - strong [ref=e718]: "Hybrid Cloud Enablement with Azure Arc:"
            - text: Extend Azure management capabilities to on-premises servers using Azure Arc-enabled server. This enables centralized monitoring, policy enforcement, and management for hybrid environments.
        - listitem [ref=e719]:
          - paragraph [ref=e720]:
            - strong [ref=e721]: "Advanced Disaster Recovery and Failover:"
            - text: Configure Azure Site Recovery (ASR) to protect on-premises infrastructure. Perform test failovers and failover operations to Azure Cloud, ensuring business continuity in case of disasters.
        - listitem [ref=e722]:
          - paragraph [ref=e723]:
            - strong [ref=e724]: "Integrated Security and Monitoring:"
            - text: Enable Microsoft Defender for Cloud, Microsoft Sentinel, and Azure Monitor to safeguard workloads post-migration. Integrate with Log Analytics for real-time insights and threat detection across your environment.
        - listitem [ref=e725]:
          - paragraph [ref=e726]:
            - strong [ref=e727]: "Business Case Analysis for Strategic Insights:"
            - text: Conduct business case analysis to evaluate the financial and operational benefits of migration. Utilize Azure's reporting tools to assess cost savings, performance improvements, and ROI.
        - listitem [ref=e728]:
          - paragraph [ref=e729]:
            - strong [ref=e730]: "Unified Management and Automation:"
            - text: Use Azure's centralized platform to manage all migrated workloads, automate processes, and apply consistent governance, security, and compliance across your infrastructure.
      - heading "Hands-on Labs Scenario" [level=2] [ref=e731]
      - paragraph [ref=e732]: The following labs provide you with a quick and easy way to get started with Azure Migrate through on-premises environments that do not require any complex setup or installations.
      - paragraph [ref=e733]: For the purposes of these Hands-on Labs (HOLs), let’s consider that SmartHotel is a large hotel company.
      - paragraph [ref=e734]: Their IT systems run Windows, Linux, SQL Servers, and MySQL across on-premises data centers, distribution centers, and multiple public clouds. This poses operational challenges for SmartHotel. They’d like a consistent way to govern and operate across these disparate environments, ensure security across the entire organization, and enable innovation and developer agility, all while meeting regulatory and compliance requirements and being able to leverage the latest innovations of database technologies.
      - heading "Objective" [level=2] [ref=e735]
      - list [ref=e736]:
        - listitem [ref=e737]:
          - paragraph [ref=e738]:
            - strong [ref=e739]: "Evaluate and Plan Migration:"
            - text: Assess your current environment using Azure Migrate, create migration assessments, and configure dependency visualization to ensure a smooth transition.
        - listitem [ref=e740]:
          - paragraph [ref=e741]:
            - strong [ref=e742]: "Set Up Azure Environment:"
            - text: Prepare Azure for migration by creating storage accounts, registering Hyper-V hosts, enabling replication, and configuring networking.
        - listitem [ref=e743]:
          - paragraph [ref=e744]:
            - strong [ref=e745]: "Migrate Workloads:"
            - text: Use Azure Migrate and Azure Site Recovery to migrate Windows, SQL Server, Linux, and OSS DB workloads, ensuring minimal downtime and leveraging Azure's scalability.
        - listitem [ref=e746]:
          - paragraph [ref=e747]:
            - strong [ref=e748]: "Optimize Workloads:"
            - text: Enhance the performance and resilience of migrated workloads using VM Scale Sets, Azure Automanage, and Azure Active Directory SSH Login for Linux.
        - listitem [ref=e749]:
          - paragraph [ref=e750]:
            - strong [ref=e751]: "Disaster Recovery and Security:"
            - text: Implement disaster recovery plans with Azure Site Recovery, conduct test failovers, and enable failovers to Azure VMs. Enhance security with Microsoft Defender for Cloud, Microsoft Sentinel, and Azure Monitor.
        - listitem [ref=e752]:
          - paragraph [ref=e753]:
            - strong [ref=e754]: "Business Case Analysis:"
            - text: Perform business case analysis to ensure compliance and optimize resource management for Azure Services.
      - heading "Pre-requisites" [level=2] [ref=e755]
      - list [ref=e756]:
        - listitem [ref=e757]:
          - paragraph [ref=e758]:
            - strong [ref=e759]: "Access to Azure Environment:"
            - text: An active Azure subscription with necessary permissions to deploy and configure resources, including enabling Azure Migrate and Azure Site Recovery (ASR).
        - listitem [ref=e760]:
          - paragraph [ref=e761]:
            - strong [ref=e762]: "Familiarity with Azure Services and Migration Tools:"
            - text: Basic understanding of Azure concepts, resource management, and migration tools like Azure Migrate, Azure Hybrid Benefit, and ASR to ensure seamless migration.
        - listitem [ref=e763]:
          - paragraph [ref=e764]:
            - strong [ref=e765]: "Technical Environment Preparation:"
            - text: Prepared on-premises environment with necessary agents installed, server discovery enabled, and application compatibility assessed for migration readiness.
      - heading "Architecture" [level=2] [ref=e766]
      - paragraph [ref=e767]: The architecture diagram outlines a series of labs focused on migrating workloads to Azure, configuring Azure services, and leveraging Microsoft tools for optimization and monitoring. The labs begin with migrating Windows, SQL Server, Linux, and OSS database workloads, setting up environments for migration, and utilizing tools like Azure Migrate and the Azure Hybrid Benefit to transition applications and data. Users then onboard on-premises servers to Azure Arc-enabled, configure Azure Site Recovery (ASR) for failover, and migrate infrastructure to Azure. The sequence continues with enabling Microsoft Defender for Cloud, Sentinel, and Azure Monitor while setting up log analytics for security and monitoring, culminating in a business case analysis capability, offering a comprehensive understanding of Azure migration, optimization, and security operations.
      - heading "Architecture Diagram" [level=2] [ref=e768]
      - paragraph [ref=e769]:
        - img "A slide shows the on-premises SmartHotel application architecture." [ref=e770]
      - heading "Explanation of Components" [level=2] [ref=e771]
      - list [ref=e772]:
        - listitem [ref=e773]:
          - paragraph [ref=e774]:
            - strong [ref=e775]: "Azure Copilot:"
            - text: Azure Copilot is an AI-powered assistant in Azure that helps manage resources, automate tasks, generate configurations, troubleshoot issues, and provide insights using natural language, improving productivity and operational efficiency.
        - listitem [ref=e776]:
          - paragraph [ref=e777]:
            - strong [ref=e778]: "Azure Migrate:"
            - text: A centralized hub for discovering, assessing, and migrating on-premises servers, applications, and databases to Azure. It simplifies migration planning and execution by providing tools for workload analysis, cost estimation, and seamless migration.
        - listitem [ref=e779]:
          - paragraph [ref=e780]:
            - strong [ref=e781]: "Azure Arc:"
            - text: Enables on-premises servers and other non-Azure resources to integrate with Azure's management tools, allowing organizations to manage, secure, and govern resources across hybrid environments through a unified Azure interface.
        - listitem [ref=e782]:
          - paragraph [ref=e783]:
            - strong [ref=e784]: "Azure Site Recovery (ASR):"
            - text: A disaster recovery solution that replicates on-premises servers to Azure, enabling failover and failback of workloads to ensure business continuity during outages or system failures.
        - listitem [ref=e785]:
          - paragraph [ref=e786]:
            - strong [ref=e787]: "Microsoft Defender for Cloud:"
            - text: A security management tool that provides visibility and protection for workloads running in Azure, on-premises, and other cloud platforms. It helps detect threats, manage security posture, and ensure compliance.
        - listitem [ref=e788]:
          - paragraph [ref=e789]:
            - strong [ref=e790]: "Microsoft Sentinel:"
            - text: A cloud-native security information and event management (SIEM) and security orchestration, automated response (SOAR) solution that aggregates security data, detects threats, and enables incident response through playbooks and analytics.
        - listitem [ref=e791]:
          - paragraph [ref=e792]:
            - strong [ref=e793]: "Azure Monitor:"
            - text: A service that collects, analyzes, and acts on telemetry data from Azure resources, on-premises environments, and other clouds, providing insights into the performance and health of applications and infrastructure.
        - listitem [ref=e794]:
          - paragraph [ref=e795]:
            - strong [ref=e796]: "Log Analytics:"
            - text: A tool within Azure Monitor that enables querying and analyzing log data from Azure resources to gain insights, troubleshoot issues, and improve operational efficiency.
        - listitem [ref=e797]:
          - paragraph [ref=e798]:
            - strong [ref=e799]: "Azure Hybrid Benefit:"
            - text: A licensing benefit that helps organizations reduce costs when migrating workloads to Azure by allowing them to use existing on-premises licenses for Windows Server and SQL Server in the cloud.
        - listitem [ref=e800]:
          - paragraph [ref=e801]:
            - strong [ref=e802]: "Business Case Analysis:"
            - text: A read-only capability designed to help organizations assess the financial and operational benefits of migrating workloads to Azure, providing insights into cost optimization and ROI.
