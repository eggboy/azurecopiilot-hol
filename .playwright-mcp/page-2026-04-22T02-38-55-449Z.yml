          - paragraph [ref=e180]:
            - img [ref=e181] [cursor=pointer]
        - listitem [ref=e182]:
          - paragraph [ref=e183]: The Copilot Agent will analyze the project, generate and open plan.md and progress.md, then automatically proceed with the migration process.
        - listitem [ref=e184]:
          - paragraph [ref=e185]: "The agent checks the version control system status and checks out a new branch for migration, then performs the code changes. Click Allow for any tool call requests from the agent. When the code migration is complete, the agent will automatically run a validation and fix iteration loop which includes:"
          - list [ref=e186]:
            - listitem [ref=e187]: "CVE Validation: Detects Common Vulnerabilities and Exposures in current dependencies and fixes them."
            - listitem [ref=e188]: "Build Validation: Attempts to resolve any build errors."
            - listitem [ref=e189]: "Consistency Validation: Analyzes the code for functional consistency."
            - listitem [ref=e190]: "Test Validation: Runs unit tests and automatically fixes any failures."
            - listitem [ref=e191]: "Completeness Validation: Catches migration items missed in the initial code migration and fixes them."
            - listitem [ref=e192]: After all validations complete, the agent generates a summary.md as the final step.
      - paragraph [ref=e193]: Review the proposed code changes and click Keep to apply them.
